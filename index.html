<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Chat Application</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Modern Chat UI Styles */
    :root {
      --primary-color: #3498db;
      --bg-light: #f5f7f9;
      --sidebar-bg: #ffffff;
      --text-main: #2c3e50;
      --text-muted: #95a5a6;
      --bubble-me: #3498db;
      --bubble-other: #ffffff;
      --border-color: #e6ecf0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #e6ebee;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Auth Bar - Keep existing styling */
    #auth {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-light);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    #login-form {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    #login-email,
    #login-username,
    #login-password,
    #add-friend-input {
      padding: 0.6rem 0.8rem;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    #login-email:focus,
    #login-username:focus,
    #login-password:focus,
    #add-friend-input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }

    #login-form button,
    #register-btn,
    #add-friend-btn {
      background: var(--primary-color);
      border: none;
      color: #fff;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    #login-form button:hover,
    #register-btn:hover,
    #add-friend-btn:hover {
      background: #2980b9;
    }

    #login-status {
      color: #d32f2f;
      font-size: 0.9rem;
      margin-left: 0.5rem;
    }

    /* Main App Container */
    #app {
      flex: 1;
      display: flex;
      min-height: 0;
      overflow: hidden;
    }

    /* Sidebar */
    #sidebar {
      width: 300px;
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      background: var(--sidebar-bg);
      flex-shrink: 0;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    #sidebar section {
      border-bottom: 1px solid var(--border-color);
      padding: 1rem;
      flex-shrink: 0;
    }

    #friends-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0;
    }

    #sidebar section h3 {
      margin: 0 0 0.75rem 0;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 1rem 1rem 0.75rem 1rem;
    }

    #friends-section h3 {
      padding: 1rem 1rem 0.75rem 1rem;
    }

    #pending-requests,
    #friends {
      list-style: none;
      margin: 0;
      padding: 0;
      flex: 1;
      overflow-y: auto;
    }

    #friends-section #friends {
      padding: 0.5rem 0.5rem;
    }

    #pending-requests li,
    #friends li {
      padding: 12px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 4px;
      border: none;
    }

    #friends li {
      margin: 4px 0;
    }

    #pending-requests li:hover,
    #friends li:hover {
      background: #f8fafc;
    }

    #pending-requests li.active,
    #friends li.active {
      background: #e3effd;
      border-left: 4px solid var(--primary-color);
      padding-left: 8px;
    }

    /* Friend Item Content */
    #friends li .friend-content,
    #pending-requests li .friend-content {
      flex: 1;
      min-width: 0;
    }

    .friend-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
    }

    .friend-info h4 {
      margin: 0;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .friend-info p {
      margin: 2px 0 0 0;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Chat Area */
    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f0f2f5;
      overflow: hidden;
    }

    #chat-header {
      padding: 15px 25px;
      background: white;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      flex-shrink: 0;
    }

    #chat-title {
      margin: 0;
      font-size: 1.1rem;
      color: var(--text-main);
      font-weight: 600;
    }

    #chat-header small {
      color: #27ae60;
      font-size: 0.85rem;
      margin-top: 0.25rem;
      display: block;
    }

    #chat-header > div:last-child {
      display: flex;
      gap: 15px;
      color: var(--text-muted);
    }

    #chat-header i {
      cursor: pointer;
      transition: color 0.2s;
    }

    #chat-header i:hover {
      color: var(--primary-color);
    }

    /* Messages Container */
    #messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      list-style: none;
      margin: 0;
    }

    /* Message Bubbles */
    #messages li {
      display: flex;
      margin: 0;
      padding: 0;
    }

    #messages li.message-sent {
      justify-content: flex-end;
    }

    .msg {
      max-width: 70%;
      padding: 10px 15px;
      border-radius: 15px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      word-break: break-word;
    }

    #messages li.message-sent .msg {
      background: var(--bubble-me);
      color: white;
      border-bottom-right-radius: 2px;
    }

    #messages li.message-received .msg {
      background: var(--bubble-other);
      color: var(--text-main);
      border-bottom-left-radius: 2px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }

    /* Input Area */
    #chat-area form {
      padding: 15px 20px;
      background: white;
      border-top: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      background: var(--bg-light);
      padding: 8px 15px;
      border-radius: 25px;
      align-items: center;
      gap: 10px;
    }

    #input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      padding: 5px 0;
      font-size: 14px;
      font-family: inherit;
    }

    #input::placeholder {
      color: var(--text-muted);
    }

    #chat-area form button {
      background: var(--primary-color);
      color: white;
      border: none;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      padding: 0;
      min-width: 35px;
    }

    #chat-area form button:hover {
      background: #2980b9;
    }

    .input-wrapper i {
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.2s;
    }

    .input-wrapper i:hover {
      color: var(--primary-color);
    }
  </style>
</head>
<body>
  <div id="auth">
    <form id="login-form">
      <input id="login-email" type="email" placeholder="Email" required />
      <input id="login-username" type="text" placeholder="Username" />
      <input id="login-password" type="password" placeholder="Password" required />
      <button type="submit">Login</button>
      <button type="button" id="register-btn">Register</button>
      <span id="login-status"></span>
    </form>
  </div>

  <div id="app">
    <aside id="sidebar">
      <section id="friend-requests">
        <h3>Friend Requests</h3>
        <ul id="pending-requests"></ul>
      </section>

      <section id="add-friend">
        <h3>Add Friend</h3>
        <input id="add-friend-input" type="text" placeholder="User ID or Username">
        <button id="add-friend-btn">Send Request</button>
      </section>

      <section id="friends-section">
        <h3>Friends</h3>
        <ul id="friends"></ul>
      </section>
    </aside>

    <section id="chat-area">
      <header id="chat-header">
        <div>
          <h3 id="chat-title">Select a friend</h3>
          <small>● Online</small>
        </div>
        <div>
          <i class="fas fa-video" style="margin-right: 15px;"></i>
          <i class="fas fa-phone" style="margin-right: 15px;"></i>
          <i class="fas fa-ellipsis-v"></i>
        </div>
      </header>

      <ul id="messages"></ul>

      <form id="form" action="">
        <div class="input-wrapper">
          <i class="far fa-smile"></i>
          <i class="fas fa-paperclip"></i>
          <input id="input" autocomplete="off" placeholder="Type a message..." />
          <button type="submit">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </form>
    </section>
  </div>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script></script>
  <script>
    let counter = 0;
    let currentUserId = null;
    let currentUserProfile = null;
    let socket = null;
    let allMessages = [];
    let friends = [];
    let userProfiles = {};
    let pendingRequests = [];
    let onlineStatus = {};
    let selectedPeerId = null;
    let selectedPeerProfile = null;

    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const messagesEl = document.getElementById('messages');
    const friendsEl = document.getElementById('friends');
    const pendingRequestsEl = document.getElementById('pending-requests');
    const addFriendInput = document.getElementById('add-friend-input');
    const addFriendBtn = document.getElementById('add-friend-btn');
    const chatTitle = document.getElementById('chat-title');
    const loginForm = document.getElementById('login-form');
    const loginEmail = document.getElementById('login-email');
    const loginUsername = document.getElementById('login-username');
    const loginPassword = document.getElementById('login-password');
    const loginStatus = document.getElementById('login-status');

    function connectSocket() {
      if (!currentUserId) return;

      if (socket) {
        socket.disconnect();
      }

      socket = io({
        auth: {
          serverOffset: 0,
          userId: currentUserId
        },
        ackTimeout: 10000,
        retries: 3,
      });

      socket.on('private message', (message) => {
        const stored = {
          id: Date.now(),
          content: message.text || message.content,
          senderId: message.from,
          receiverId: currentUserId
        };

        allMessages.push(stored);

        if (selectedPeerId != null && isMessageInCurrentConversation(stored)) {
          appendMessageElement(stored);
        }
      });
    }

    function isMessageInCurrentConversation(message) {
      if (!currentUserId || selectedPeerId == null) return false;

      const { senderId, receiverId } = message;

      if (senderId === selectedPeerId && receiverId === currentUserId) {
        return true;
      }

      if (senderId === currentUserId && receiverId === selectedPeerId) {
        return true;
      }

      return false;
    }

    function appendMessageElement(message) {
      const item = document.createElement('li');
      item.className = message.senderId === currentUserId ? 'message-sent' : 'message-received';

      const msgDiv = document.createElement('div');
      msgDiv.className = 'msg';
      msgDiv.textContent = message.content;

      item.appendChild(msgDiv);
      messagesEl.appendChild(item);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function loadMessageHistory(userId, friendId) {
      if (!userId || !friendId) return;

      try {
        const response = await fetch(`/api/messages?userId=${userId}&friendId=${friendId}`);
        if (!response.ok) {
          console.log('No message history available');
          return;
        }

        const messages = await response.json();
        if (Array.isArray(messages)) {
          messages.forEach(msg => {
            const stored = {
              id: msg.id,
              content: msg.content,
              senderId: msg.sender_id || msg.senderId,
              receiverId: msg.receiver_id || msg.receiverId
            };
            if (!allMessages.find(m => m.id === stored.id)) {
              allMessages.push(stored);
            }
          });
          renderMessagesForCurrentConversation();
        }
      } catch (err) {
        console.log('Error loading message history:', err);
      }
    }

    function renderMessagesForCurrentConversation() {
      messagesEl.innerHTML = '';
      if (!currentUserId || selectedPeerId == null) return;

      const relevant = allMessages.filter(isMessageInCurrentConversation);
      relevant.sort((a, b) => a.id - b.id);
      relevant.forEach(msg => {
        const item = document.createElement('li');
        item.className = msg.senderId === currentUserId ? 'message-sent' : 'message-received';

        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg';
        msgDiv.textContent = msg.content;

        item.appendChild(msgDiv);
        messagesEl.appendChild(item);
      });

      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function loadFriends() {
      if (!currentUserId) return;

      try {
        const response = await fetch(`/api/friends?userId=${currentUserId}`);
        if (!response.ok) {
          return;
        }
        friends = await response.json();

        for (const friend of friends) {
          if (!userProfiles[friend.id]) {
            try {
              const profileRes = await fetch(`/api/users/${friend.id}`);
              if (profileRes.ok) {
                userProfiles[friend.id] = await profileRes.json();
              }
            } catch (err) {
              console.error(`Error loading profile for user ${friend.id}:`, err);
            }
          }
        }

        await loadOnlineStatus();
        renderFriendList();
      } catch (err) {
        console.error('Error loading friends:', err);
      }
    }

    async function loadPendingRequests() {
      if (!currentUserId) return;

      try {
        const response = await fetch(`/api/friends/pending?userId=${currentUserId}`);
        if (!response.ok) {
          return;
        }
        pendingRequests = await response.json();

        for (const request of pendingRequests) {
          if (!userProfiles[request.id]) {
            try {
              const profileRes = await fetch(`/api/users/${request.id}`);
              if (profileRes.ok) {
                userProfiles[request.id] = await profileRes.json();
              }
            } catch (err) {
              console.error(`Error loading profile for user ${request.id}:`, err);
            }
          }
        }

        renderPendingRequests();
      } catch (err) {
        console.error('Error loading pending requests:', err);
      }
    }

    async function loadOnlineStatus() {
      if (!friends.length) {
        onlineStatus = {};
        return;
      }

      const ids = friends.map((f) => f.id).join(',');
      if (!ids) {
        onlineStatus = {};
        return;
      }

      try {
        const response = await fetch(`/api/online-status?userIds=${encodeURIComponent(ids)}`);
        if (!response.ok) {
          return;
        }
        onlineStatus = await response.json();
      } catch (err) {
        console.error('Error loading online status:', err);
      }
    }

    function renderFriendList() {
      friendsEl.innerHTML = '';
      friends.forEach((friend) => {
        const li = document.createElement('li');
        li.className = 'friend-item';
        if (friend.id === selectedPeerId) {
          li.classList.add('active');
        }

        const profile = userProfiles[friend.id];
        const avatarUrl = profile?.avatar || `https://api.dicebear.com/7.x/initials/svg?seed=User${friend.id}`;
        const username = profile?.username || `User ${friend.id}`;

        const avatar = document.createElement('div');
        avatar.className = 'friend-avatar';
        avatar.style.backgroundImage = `url('${avatarUrl}')`;

        const contentDiv = document.createElement('div');
        contentDiv.className = 'friend-content';

        const infoDiv = document.createElement('div');
        infoDiv.className = 'friend-info';

        const nameEl = document.createElement('h4');
        nameEl.textContent = username;

        const statusEl = document.createElement('p');
        statusEl.textContent = 'Online';

        infoDiv.appendChild(nameEl);
        infoDiv.appendChild(statusEl);
        contentDiv.appendChild(infoDiv);

        li.appendChild(avatar);
        li.appendChild(contentDiv);

        li.addEventListener('click', async () => {
          selectedPeerId = friend.id;
          selectedPeerProfile = profile || { id: friend.id, username, avatar: avatarUrl };
          renderFriendList();
          updateChatTitle();
          await loadMessageHistory(currentUserId, friend.id);
        });

        friendsEl.appendChild(li);
      });
    }

    function renderPendingRequests() {
      pendingRequestsEl.innerHTML = '';
      if (pendingRequests.length === 0) {
        const empty = document.createElement('li');
        empty.textContent = 'No pending requests';
        empty.style.color = '#999';
        pendingRequestsEl.appendChild(empty);
        return;
      }

      pendingRequests.forEach((request) => {
        const li = document.createElement('li');
        const profile = userProfiles[request.id];
        const username = profile?.username || `User ${request.id}`;
        const avatarUrl = profile?.avatar || `https://api.dicebear.com/7.x/initials/svg?seed=User${request.id}`;

        const contentDiv = document.createElement('div');
        contentDiv.className = 'friend-content';

        const infoDiv = document.createElement('div');
        infoDiv.className = 'friend-info';

        const nameEl = document.createElement('h4');
        nameEl.textContent = username;

        infoDiv.appendChild(nameEl);
        contentDiv.appendChild(infoDiv);
        li.appendChild(contentDiv);

        const btn = document.createElement('button');
        btn.textContent = 'Accept';
        btn.addEventListener('click', async () => {
          await acceptFriendRequest(request.id);
        });

        li.appendChild(btn);
        pendingRequestsEl.appendChild(li);
      });
    }

    async function acceptFriendRequest(friendId) {
      if (!currentUserId) return;

      try {
        const response = await fetch('/api/friends/accept', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ userId: currentUserId, friendId })
        });

        if (response.ok) {
          await loadFriends();
          await loadPendingRequests();
        }
      } catch (err) {
        console.error('Error accepting friend request:', err);
      }
    }

    async function sendFriendRequest(friendId) {
      if (!currentUserId) return;

      try {
        const response = await fetch('/api/friends/request', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ userId: currentUserId, friendId})
        });

        if (response.ok) {
          addFriendInput.value = '';
          alert('Friend request sent!');
        } else {
          const error = await response.json();
          alert(`Error: ${error.error || 'Failed to send request'}`);
        }
      } catch (err) {
        console.error('Error sending friend request:', err);
        alert('Failed to send friend request');
      }
    }

    async function resolveFriendIdFromInput(input) {
      const numId = parseInt(input, 10);
      if (!isNaN(numId) && numId > 0) {
        return numId;
      }

      try {
        const response = await fetch(`/api/users/by-username/${encodeURIComponent(input)}`);
        if (response.ok) {
          const user = await response.json();
          return user.id;
        }
      } catch (err) {
        console.error('Error resolving username:', err);
      }

      return null;
    }

    function updateChatTitle() {
      if (selectedPeerId == null) {
        chatTitle.textContent = 'Select a friend';
      } else if (selectedPeerProfile && selectedPeerProfile.username) {
        chatTitle.textContent = selectedPeerProfile.username;
      } else {
        chatTitle.textContent = `User ${selectedPeerId}`;
      }
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = loginEmail.value.trim();
      const password = loginPassword.value;

      if (!email || !password) {
        loginStatus.textContent = 'Email and password are required';
        return;
      }

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          loginStatus.textContent = errorData.error || 'Login failed';
          currentUserId = null;
          return;
        }

        const data = await response.json();
        currentUserId = data.id;
        currentUserProfile = data;
        userProfiles[data.id] = data;
        loginStatus.textContent = `Logged in as ${data.username} (id: ${data.id})`;

        connectSocket();
        await loadFriends();
        await loadPendingRequests();
        updateChatTitle();
      } catch (err) {
        loginStatus.textContent = 'Network error';
        currentUserId = null;
      }
    });

    document.getElementById('register-btn').addEventListener('click', async (e) => {
      e.preventDefault();

      const email = loginEmail.value.trim();
      const password = loginPassword.value;
      const username = loginUsername.value.trim();

      if (!email || !password || !username) {
        loginStatus.textContent = 'Email, password, and username are required';
        return;
      }

      try {
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password, username })
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          loginStatus.textContent = errorData.error || 'Register failed';
          currentUserId = null;
          return;
        }

        const data = await response.json();
        currentUserId = data.id;
        currentUserProfile = data;
        userProfiles[data.id] = data;
        loginStatus.textContent = `Logged in as ${data.username} (id: ${data.id})`;

        connectSocket();
        await loadFriends();
        await loadPendingRequests();
        updateChatTitle();
      } catch (err) {
        loginStatus.textContent = 'Network error';
        currentUserId = null;
      }
    });

    addFriendBtn.addEventListener('click', async () => {
      const input = addFriendInput.value.trim();
      if (!input) {
        alert('Please enter a user ID or username');
        return;
      }

      const friendId = await resolveFriendIdFromInput(input);
      if (!friendId) {
        alert('User not found');
        return;
      }

      if (friendId === currentUserId) {
        alert('You cannot add yourself');
        return;
      }

      await sendFriendRequest(friendId);
    });

    addFriendInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        addFriendBtn.click();
      }
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (!socket || !currentUserId || selectedPeerId == null) {
        return;
      }
      if (!input.value.trim()) {
        return;
      }

      const clientOffset = `${socket.id}-${counter++}`;
      const payload = {
        content: input.value,
        senderId: currentUserId,
        receiverId: selectedPeerId
      };

      const localMessage = {
        id: Date.now(),
        content: input.value,
        senderId: currentUserId,
        receiverId: selectedPeerId
      };
      allMessages.push(localMessage);
      if (isMessageInCurrentConversation(localMessage)) {
        appendMessageElement(localMessage);
      }

      socket.emit('private message', { to: selectedPeerId, text: input.value });
      input.value = '';
    });
  </script>
</body>
</html>
